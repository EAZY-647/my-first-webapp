name: CI Pipeline

# Tell the robot to run whenever you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # Give the robot a temporary Ubuntu server to work on
    runs-on: ubuntu-latest

    steps:
      # 1. The robot downloads your code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. The robot logs into your Docker Hub using your saved secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. The robot builds the container and pushes it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aim-hospital-app:latest